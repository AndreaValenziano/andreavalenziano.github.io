<svg viewBox="0 0 980 860" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>Mappa concettuale del capitolo 20: Nuove gerarchie economiche internazionali</title>
<rect width="980" height="860" fill="#ffffff"/>
<style>
  .h1 { font-size: 21px; font-weight: 700; fill: #ffffff; }
  .sub { font-size: 12.5px; fill: #ffffff; opacity:.92; }
  .thesis { font-size: 12.5px; fill: #2C2C2A; }
  .colh { font-size: 14px; font-weight: 700; fill: #ffffff; }
  .grp { font-size: 11.5px; font-weight:700; fill: #2C2C2A; letter-spacing:.3px;}
  .b { font-size: 11.5px; fill: #2C2C2A; }
  .date { font-weight: 700; fill: #0F6E56; }
</style>

<rect x="20" y="18" width="940" height="64" rx="12" fill="#3C3489"/>
<text x="40" y="46" class="h1">CAP. 20 — Nuove gerarchie economiche internazionali</text>
<text x="40" y="68" class="sub">Fine XVII–XVIII secolo · l'Europa al centro del commercio mondiale</text>

<rect x="20" y="96" width="940" height="62" rx="10" fill="#EEEDFE" stroke="#CECBF6"/>
<text x="36" y="120" class="thesis"><tspan font-weight="700">Tesi:</tspan> Inghilterra, Francia e Province Unite scardinano il monopolio iberico → la concorrenza anglo-francese sfocia</text>
<text x="36" y="139" class="thesis">nella <tspan class="date">Guerra dei Sette Anni (1756–63)</tspan>. Vince la Gran Bretagna, prima potenza commerciale e navale →</text>
<text x="36" y="151" class="thesis" font-size="11">gerarchia mondiale con l'Europa al centro, premessa del colonialismo del XIX sec.</text>

<rect x="20" y="176" width="222" height="664" rx="10" fill="#ffffff" stroke="#CECBF6"/>
<rect x="20" y="176" width="222" height="40" rx="10" fill="#534AB7"/>
<rect x="20" y="200" width="222" height="16" fill="#534AB7"/>
<text x="33" y="201" class="colh">20.1 Portogallo &amp; Spagna</text>
<text x="33" y="244" class="grp">PORTOGALLO ▸ svolta atlantica</text>
<text x="33" y="266" class="b">• Alleanza con l'Inghilterra:</text>
<text x="33" y="284" class="b">  <tspan class="date">1662</tspan> cede Bombay (dote Stuart)</text>
<text x="33" y="304" class="b">• Dall'Asia all'Atlantico:</text>
<text x="33" y="322" class="b">  colonizza Brasile e Angola</text>
<text x="33" y="342" class="b">• Brasile: zucchero (Nord)</text>
<text x="33" y="360" class="b">  con schiavi africani</text>
<text x="33" y="380" class="b">• Oro e diamanti a sud → asse</text>
<text x="33" y="398" class="b">  verso sud + afflusso di coloni</text>
<text x="33" y="418" class="b">• Calo dell'oro → tabacco/cotone</text>
<text x="33" y="436" class="b">  al Nord → traffici con la GB</text>
<text x="33" y="466" class="grp">SPAGNA ▸ monopolio eroso</text>
<text x="33" y="488" class="b">• America centro-meridionale;</text>
<text x="33" y="506" class="b">  monopolio via Siviglia</text>
<text x="33" y="526" class="b">• Distanze, corsari, manifatture</text>
<text x="33" y="544" class="b">  deboli → contrabbando</text>
<text x="33" y="564" class="b">• <tspan font-style="italic">Asiento</tspan> → Francia (<tspan class="date">1700</tspan>)</text>
<text x="33" y="584" class="b">• <tspan class="date">Utrecht 1713</tspan>: esclusiva degli</text>
<text x="33" y="602" class="b">  schiavi alla GB → «colonia</text>
<text x="33" y="620" class="b">  commerciale» inglese</text>

<rect x="254" y="176" width="222" height="664" rx="10" fill="#ffffff" stroke="#CECBF6"/>
<rect x="254" y="176" width="222" height="40" rx="10" fill="#534AB7"/>
<rect x="254" y="200" width="222" height="16" fill="#534AB7"/>
<text x="267" y="201" class="colh">20.2 Gran Bretagna</text>
<text x="267" y="244" class="grp">ASCESA IMPERIALE</text>
<text x="267" y="266" class="b">• 1ª potenza commerciale e</text>
<text x="267" y="284" class="b">  navale; erode gli olandesi</text>
<text x="267" y="304" class="b">• Walpole (rafforzamento) →</text>
<text x="267" y="322" class="b">  Pitt: espansione coloniale</text>
<text x="267" y="342" class="b">• Francia: soppianta gli olandesi</text>
<text x="267" y="360" class="b">  alle Antille; importa dal Canada</text>
<text x="267" y="378" class="b">  (pellicce, pesce, ferro, legname)</text>
<text x="267" y="408" class="grp">GUERRA DEI 7 ANNI (<tspan class="date">1756–63</tspan>)</text>
<text x="267" y="430" class="b">• GB + Prussia vs Francia,</text>
<text x="267" y="448" class="b">  Austria, Russia</text>
<text x="267" y="468" class="b">• Obiettivo GB: battere la Francia</text>
<text x="267" y="486" class="b">  in America sett. e in India</text>
<text x="267" y="506" class="b">• <tspan class="date">Pace di Parigi 1763</tspan>:</text>
<text x="267" y="524" class="b">  Canada, est Mississippi, Florida</text>
<text x="267" y="554" class="grp">COMMERCIO &amp; SCHIAVI</text>
<text x="267" y="576" class="b">• America = mercato di sbocco;</text>
<text x="267" y="594" class="b">  scambi su 4 continenti (Londra)</text>
<text x="267" y="614" class="b">• Commercio triangolare</text>
<text x="267" y="632" class="b">  Europa–Africa–America</text>
<text x="267" y="652" class="b">• Abolizione della tratta <tspan class="date">1808</tspan></text>

<rect x="488" y="176" width="222" height="664" rx="10" fill="#ffffff" stroke="#CECBF6"/>
<rect x="488" y="176" width="222" height="40" rx="10" fill="#534AB7"/>
<rect x="488" y="200" width="222" height="16" fill="#534AB7"/>
<text x="501" y="201" class="colh">20.3 Commerci con l'Asia</text>
<text x="501" y="244" class="grp">NUOVE MERCI</text>
<text x="501" y="266" class="b">• Cresce il commercio di</text>
<text x="501" y="284" class="b">  manufatti, soprattutto tessili</text>
<text x="501" y="304" class="b">• Cotone indiano (India NE):</text>
<text x="501" y="322" class="b">  prima gli olandesi, poi moda</text>
<text x="501" y="340" class="b">  europea + schiavi d'America</text>
<text x="501" y="360" class="b">• Basi inglesi e francesi; EIC</text>
<text x="501" y="378" class="b">  a Calcutta (Bengala)</text>
<text x="501" y="398" class="b">• Per non drenare argento:</text>
<text x="501" y="416" class="b">  tè cinese pagato con oppio</text>
<text x="501" y="446" class="grp">EGEMONIA BRITANNICA</text>
<text x="501" y="468" class="b">• Scontro anglo-francese in</text>
<text x="501" y="486" class="b">  Bengala (dal <tspan class="date">1744</tspan>) → il trattato</text>
<text x="501" y="504" class="b">  sancisce l'egemonia in India</text>
<text x="501" y="524" class="b">• Compagnia fr. soppressa <tspan class="date">1790</tspan></text>
<text x="501" y="544" class="b">• Parlamento: due leggi → EIC</text>
<text x="501" y="562" class="b">  sotto controllo di Londra +</text>
<text x="501" y="580" class="b">  fine del monopolio</text>

<rect x="722" y="176" width="238" height="664" rx="10" fill="#ffffff" stroke="#CECBF6"/>
<rect x="722" y="176" width="238" height="40" rx="10" fill="#534AB7"/>
<rect x="722" y="200" width="238" height="16" fill="#534AB7"/>
<text x="735" y="201" class="colh">20.4 Il Mediterraneo</text>
<text x="735" y="244" class="grp">PERDITA DI CENTRALITÀ</text>
<text x="735" y="266" class="b">• Baricentro dei traffici →</text>
<text x="735" y="284" class="b">  Atlantico</text>
<text x="735" y="304" class="b">• Declino manifatture italiane</text>
<text x="735" y="322" class="b">  e iberiche</text>
<text x="735" y="342" class="b">• Floridezza solo nel traffico</text>
<text x="735" y="360" class="b">  a breve/medio raggio: Genova,</text>
<text x="735" y="378" class="b">  Marsiglia, Barcellona</text>
<text x="735" y="408" class="grp">MEZZOGIORNO SUBALTERNO</text>
<text x="735" y="430" class="b">• Forte penetrazione economica</text>
<text x="735" y="448" class="b">  britannica nel Sud Italia</text>
<text x="735" y="468" class="b">• Sicilia in «dipendenza</text>
<text x="735" y="486" class="b">  multipla»</text>
<text x="735" y="506" class="b">• Import e medio raggio via</text>
<text x="735" y="524" class="b">  Napoli, Livorno, Genova</text>
<text x="735" y="544" class="b">• Esporta materie prime e grezzi</text>
<text x="735" y="562" class="b">  → subordinata alle flotte</text>
<text x="735" y="580" class="b">  atlantiche</text>

<text x="20" y="856" font-size="10.5" fill="#5F5E5A">Le date in evidenza segnano gli snodi cronologici del capitolo.</text>
</svg>
