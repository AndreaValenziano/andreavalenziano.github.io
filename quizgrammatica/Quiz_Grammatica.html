<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz di Grammatica Italiana</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f0e8;
    color: #2c2416;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #2c3e50, #4a6741);
    color: white;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.9rem; letter-spacing: 1px; margin-bottom: 6px; }
  header p { font-size: 0.95rem; opacity: 0.85; font-style: italic; }

  #progress-bar-container {
    background: #d4c9b0;
    height: 8px;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4a6741, #7aad6d);
    width: 0%;
    transition: width 0.4s ease;
  }

  #quiz-container {
    max-width: 780px;
    margin: 36px auto;
    padding: 0 16px 60px;
  }

  #question-counter {
    font-size: 0.85rem;
    color: #7a6d58;
    text-align: right;
    margin-bottom: 10px;
    font-style: italic;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 32px 36px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-top: 4px solid #4a6741;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .source-tag {
    display: inline-block;
    font-size: 0.72rem;
    background: #edf4ea;
    color: #4a6741;
    border: 1px solid #b5d4b0;
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 14px;
    font-family: sans-serif;
  }

  .question-text {
    font-size: 1.13rem;
    line-height: 1.65;
    color: #2c2416;
    margin-bottom: 24px;
    font-weight: bold;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #faf8f4;
    border: 2px solid #e0d8cc;
    border-radius: 9px;
    padding: 13px 16px;
    cursor: pointer;
    font-size: 1rem;
    font-family: 'Georgia', serif;
    color: #2c2416;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #4a6741;
    background: #edf4ea;
  }
  .option-btn .letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e0d8cc;
    color: #5a4e3d;
    font-size: 0.85rem;
    font-weight: bold;
    font-family: sans-serif;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.2s, color 0.2s;
  }
  .option-btn.correct {
    border-color: #4a6741;
    background: #edf4ea;
  }
  .option-btn.correct .letter {
    background: #4a6741;
    color: white;
  }
  .option-btn.wrong {
    border-color: #c0392b;
    background: #fdf0ef;
  }
  .option-btn.wrong .letter {
    background: #c0392b;
    color: white;
  }
  .option-btn:disabled { cursor: default; }

  #feedback {
    margin-top: 18px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.93rem;
    line-height: 1.55;
    display: none;
    font-family: sans-serif;
  }
  #feedback.correct-fb { background: #edf4ea; color: #2d6a2d; border-left: 4px solid #4a6741; }
  #feedback.wrong-fb   { background: #fdf0ef; color: #922b21; border-left: 4px solid #c0392b; }

  #next-btn {
    display: none;
    margin-top: 22px;
    background: linear-gradient(135deg, #2c3e50, #4a6741);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 30px;
    font-size: 1rem;
    cursor: pointer;
    font-family: 'Georgia', serif;
    letter-spacing: 0.5px;
    float: right;
    transition: opacity 0.2s;
  }
  #next-btn:hover { opacity: 0.88; }
  .clearfix::after { content: ''; display: table; clear: both; }

  /* Results */
  #results-container {
    display: none;
    max-width: 780px;
    margin: 36px auto;
    padding: 0 16px 60px;
    animation: fadeIn 0.5s ease;
  }
  .results-card {
    background: white;
    border-radius: 14px;
    padding: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    text-align: center;
    border-top: 6px solid #4a6741;
  }
  .results-card h2 { font-size: 1.7rem; color: #2c3e50; margin-bottom: 8px; }
  .score-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    margin: 28px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }
  .score-circle .score-num { font-size: 2.5rem; font-weight: bold; color: white; line-height: 1; }
  .score-circle .score-den { font-size: 1rem; color: rgba(255,255,255,0.85); }
  .vote-label {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .vote-comment { font-size: 1rem; color: #6b5f50; margin-bottom: 28px; font-style: italic; }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 0 0 20px;
    font-family: sans-serif;
  }
  .stat-box { text-align: center; }
  .stat-box .stat-val { font-size: 1.5rem; font-weight: bold; }
  .stat-box .stat-lab { font-size: 0.8rem; color: #7a6d58; }
  .stat-correct .stat-val { color: #4a6741; }
  .stat-wrong   .stat-val { color: #c0392b; }
  .stat-pct     .stat-val { color: #2c3e50; }

  .results-breakdown {
    border-top: 1px solid #e0d8cc;
    padding-top: 28px;
    text-align: left;
    margin-top: 10px;
  }
  .results-breakdown h3 { font-size: 1.1rem; margin-bottom: 16px; color: #2c3e50; }
  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f0ebe2;
    font-size: 0.92rem;
  }
  .result-item .ri-num {
    font-weight: bold;
    color: #7a6d58;
    min-width: 28px;
    font-family: sans-serif;
  }
  .result-item .ri-q { flex: 1; line-height: 1.45; }
  .result-item .ri-icon { font-size: 1.1rem; flex-shrink: 0; }
  .result-item .ri-answer {
    font-size: 0.85rem;
    color: #5a6741;
    margin-top: 3px;
    display: block;
    font-style: italic;
    font-family: sans-serif;
  }
  .result-item .ri-answer.ri-wrong-answer { color: #c0392b; }

  #retry-btn {
    margin-top: 28px;
    background: linear-gradient(135deg, #2c3e50, #4a6741);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px 36px;
    font-size: 1rem;
    cursor: pointer;
    font-family: 'Georgia', serif;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
  }
  #retry-btn:hover { opacity: 0.88; }
</style>
</head>
<body>

<header>
  <h1>Quiz di Grammatica Italiana</h1>

        <div class="stat-val" id="stat-wrong"></div>
        <div class="stat-lab">Errate</div>
      </div>
      <div class="stat-box stat-pct">
        <div class="stat-val" id="stat-pct"></div>
        <div class="stat-lab">Percentuale</div>
      </div>
    </div>
    <p class="vote-label" id="vote-label"></p>
    <p class="vote-comment" id="vote-comment"></p>
    <button id="retry-btn">&#8635; Rifai il quiz</button>
    <div class="results-breakdown">
      <h3>Riepilogo domanda per domanda</h3>
      <div id="breakdown-list"></div>
    </div>
  </div>
</div>

let current = 0;
let score = 0;
let answers = [];
let shuffledOpts = [];
let shuffledCorrect = 0;
const LETTERS = ['A', 'B', 'C', 'D'];

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function init() {
  current = 0;
  score = 0;
  answers = [];
  document.getElementById('quiz-container').style.display = '';
  document.getElementById('results-container').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];

  document.getElementById('progress-bar').style.width = ((current / questions.length) * 100) + '%';
  document.getElementById('question-counter').textContent = 'Domanda ' + (current + 1) + ' di ' + questions.length;
  document.getElementById('source-tag').textContent = q.source;
  document.getElementById('question-text').textContent = q.q;

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  const indices = shuffleArray([0, 1, 2, 3]);
  shuffledOpts = indices.map(function(i) { return { text: q.opts[i], orig: i }; });
  shuffledCorrect = shuffledOpts.findIndex(function(o) { return o.orig === q.correct; });

  shuffledOpts.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="letter">' + LETTERS[i] + '</span><span>' + opt.text + '</span>';
    btn.onclick = function() { selectOption(i); };
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = '';
  fb.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = current === questions.length - 1 ? 'Vedi i risultati →' : 'Prossima domanda →';
}

function selectOption(selected) {
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach(function(b) { b.disabled = true; });

  const isCorrect = selected === shuffledCorrect;
  if (isCorrect) score++;
  answers.push({
    qIdx: current,
    isCorrect: isCorrect,
    selectedLetter: LETTERS[selected],
    correctLetter: LETTERS[shuffledCorrect],
    selectedText: shuffledOpts[selected].text,
    correctText: shuffledOpts[shuffledCorrect].text
  });

  btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[shuffledCorrect].classList.add('correct');

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'correct-fb';
    fb.textContent = '✓ Corretto! ' + q.explanation;
  } else {
    fb.className = 'wrong-fb';
    fb.textContent = '✗ Risposta errata. ' + q.explanation;
  }

  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', function() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
});

document.getElementById('retry-btn').addEventListener('click', init);

function showResults() {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('results-container').style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById('score-num').textContent = score;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-pct').textContent = pct + '%';

  const circle = document.getElementById('score-circle');
  if (pct >= 85) circle.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
  else if (pct >= 65) circle.style.background = 'linear-gradient(135deg, #f39c12, #e67e22)';
  else circle.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';

  var voteLabel, voteComment;
  if (pct >= 90) { voteLabel = '🏆 Eccellente!'; voteComment = 'Ottima preparazione — sei pronto per l\'esame!'; }
  else if (pct >= 80) { voteLabel = '⭐ Molto Bene!'; voteComment = 'Preparazione solida, qualche piccola lacuna da rivedere.'; }
  else if (pct >= 65) { voteLabel = '👍 Bene'; voteComment = 'Buona base, ma ripassate le domande errate.'; }
  else if (pct >= 50) { voteLabel = '📚 Sufficiente'; voteComment = 'Ancora un po\' di studio ti servirà per essere sicuro.'; }
  else { voteLabel = '⚠️ Insufficiente'; voteComment = 'Rivedi il materiale con attenzione prima dell\'esame.'; }

  document.getElementById('vote-label').textContent = voteLabel;
  document.getElementById('vote-comment').textContent = voteComment;

  const list = document.getElementById('breakdown-list');
  list.innerHTML = '';

  answers.forEach(function(a, i) {
    const q = questions[a.qIdx];
    const item = document.createElement('div');
    item.className = 'result-item';
    const icon = a.isCorrect ? '✅' : '❌';
    var answerHTML;
    if (a.isCorrect) {
      answerHTML = '<span class="ri-answer">Risposta: ' + a.correctLetter + '. ' + a.correctText + '</span>';
    } else {
      answerHTML = '<span class="ri-answer ri-wrong-answer">Tua risposta: ' + a.selectedLetter + '. ' + a.selectedText + '<br>Risposta corretta: ' + a.correctLetter + '. ' + a.correctText + '</span>';
    }
    item.innerHTML =
      '<span class="ri-num">' + (i+1) + '.</span>' +
      '<div class="ri-q">' + q.q + answerHTML + '</div>' +
      '<span class="ri-icon">' + icon + '</span>';
    list.appendChild(item);
  });

  document.getElementById('results-container').scrollIntoView({ behavior: 'smooth' });
}

init();
</script>
