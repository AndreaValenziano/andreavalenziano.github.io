let current = 0;
let score = 0;
let answers = [];

function init() {
  current = 0; score = 0; answers = [];
  document.getElementById('quiz-container').style.display = '';
  document.getElementById('results-container').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('progress-bar').style.width = ((current / questions.length) * 100) + '%';
  document.getElementById('question-counter').textContent = 'Domanda ' + (current + 1) + ' di ' + questions.length;
  document.getElementById('source-tag').textContent = q.source;
  document.getElementById('question-text').textContent = q.q;

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.opts.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="letter">' + letters[i] + '</span><span>' + opt + '</span>';
    btn.onclick = function() { selectOption(i); };
    optContainer.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none'; fb.className = ''; fb.textContent = '';
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = current === questions.length - 1 ? 'Vedi i risultati →' : 'Prossima domanda →';
}

function selectOption(selected) {
  const q = questions[current];
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(function(b) { b.disabled = true; });

  const isCorrect = selected === q.correct;
  if (isCorrect) score++;
  answers.push({ qIdx: current, selected: selected, correct: q.correct, isCorrect: isCorrect });

  btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.correct].classList.add('correct');

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'correct-fb';
    fb.textContent = '✓ Corretto! ' + q.explanation;
  } else {
    fb.className = 'wrong-fb';
    fb.textContent = '✗ Risposta errata. ' + q.explanation;
  }
  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', function() {
  current++;
  if (current >= questions.length) showResults();
  else showQuestion();
});

document.getElementById('retry-btn').addEventListener('click', init);

function showResults() {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('results-container').style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById('score-num').textContent = score;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-pct').textContent = pct + '%';

  const circle = document.getElementById('score-circle');
  if (pct >= 85) circle.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
  else if (pct >= 65) circle.style.background = 'linear-gradient(135deg, #f39c12, #e67e22)';
  else circle.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';

  var voteLabel, voteComment;
  if (pct >= 90) { voteLabel = '🏆 Eccellente!'; voteComment = 'Preparazione ottima — sei pronto per l\'esame!'; }
  else if (pct >= 80) { voteLabel = '⭐ Molto Bene!'; voteComment = 'Preparazione solida, qualche piccola lacuna da rivedere.'; }
  else if (pct >= 65) { voteLabel = '👍 Bene'; voteComment = 'Buona base, ripassate le domande errate.'; }
  else if (pct >= 50) { voteLabel = '📚 Sufficiente'; voteComment = 'Ancora un po\' di studio ti servirà per essere sicuro.'; }
  else { voteLabel = '⚠️ Insufficiente'; voteComment = 'Rivedi il materiale con attenzione prima dell\'esame.'; }

  document.getElementById('vote-label').textContent = voteLabel;
  document.getElementById('vote-comment').textContent = voteComment;

  const list = document.getElementById('breakdown-list');
  list.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  answers.forEach(function(a, i) {
    const q = questions[a.qIdx];
    const item = document.createElement('div');
    item.className = 'result-item';
    const icon = a.isCorrect ? '✅' : '❌';
    var answerHTML;
    if (a.isCorrect) {
      answerHTML = '<span class="ri-answer">Risposta: ' + letters[a.correct] + '. ' + q.opts[a.correct] + '</span>';
    } else {
      answerHTML = '<span class="ri-answer ri-wrong-answer">Tua risposta: ' + letters[a.selected] + '. ' + q.opts[a.selected] + '<br>Risposta corretta: ' + letters[a.correct] + '. ' + q.opts[a.correct] + '</span>';
    }
    item.innerHTML =
      '<span class="ri-num">' + (i+1) + '.</span>' +
      '<div class="ri-q">' + q.q + answerHTML + '</div>' +
      '<span class="ri-icon">' + icon + '</span>';
    list.appendChild(item);
  });

  document.getElementById('results-container').scrollIntoView({ behavior: 'smooth' });
}

init();
</script>
